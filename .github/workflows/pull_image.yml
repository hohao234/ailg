name: Sync to GHCR and Update Script

on:
  schedule:
    - cron: '0 */6 * * *' # 每6小时同步一次
  workflow_dispatch:      # 支持手动触发

jobs:
  sync-and-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Push Image
        run: |
          # 1. 拉取原版
          docker pull ailg/g-box:hostmode
          
          # 2. 获取唯一 ID (SHA)
          IMAGE_ID=$(docker inspect --format='{{index .Id}}' ailg/g-box:hostmode)
          echo "CURRENT_SHA=$IMAGE_ID" >> $GITHUB_ENV
          
          # 3. 显式指定镜像名为 g-box
          # 完整路径: ghcr.io/hjpcly1234/alig/g-box:hostmode
          docker tag ailg/g-box:hostmode ghcr.io/${{ github.repository }}/g-box:hostmode
          docker push ghcr.io/${{ github.repository }}/g-box:hostmode

      - name: Download and Patch Script
        run: |
          # 4. 下载主脚本
          curl -sL https://ailg.ggbond.org/xy_ailg.sh -o my_install.sh
          
          # 5. 修改脚本：替换镜像源为你的 GHCR 完整路径
          sed -i "s|ailg/g-box:hostmode|ghcr.io/${{ github.repository }}/g-box:hostmode|g" my_install.sh
          
          # 6. 注入 SHA：确保 local_sha 逻辑与镜像完全对齐
          sed -i "2i remote_sha=\"${{ env.CURRENT_SHA }}\"" my_install.sh
          sed -i "3i local_sha=\"${{ env.CURRENT_SHA }}\"" my_install.sh
          
          # 7. 屏蔽自带 pull
          sed -i 's/docker pull/echo skip pull #/g' my_install.sh

      - name: Commit Updated Script
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add my_install.sh
          git commit -m "🔄 同步 g-box 镜像并对齐 SHA: ${{ env.CURRENT_SHA }}" || exit 0
          git push
