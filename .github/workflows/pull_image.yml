name: Sync to GHCR and Patch

on:
  schedule:
    - cron: '0 */3 * * *' # 每 3 小时自动运行一次
  workflow_dispatch:      # 支持手动触发

jobs:
  sync-and-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Push Image
        run: |
          docker pull ailg/g-box:hostmode
          # 获取拉取到的镜像真实 Digest (指纹)
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ailg/g-box:hostmode | cut -d'@' -f2)
          echo "最新镜像指纹: $IMAGE_DIGEST"
          # 将指纹写入文件，供 NAS 远程对比
          echo "$IMAGE_DIGEST" > version.txt
          
          docker tag ailg/g-box:hostmode ghcr.io/${{ github.repository }}/g-box:hostmode
          docker push ghcr.io/${{ github.repository }}/g-box:hostmode

# ... 前面 Login 和 Pull 镜像部分保持不变 ...

      - name: Download All Related Scripts
        run: |
          # 定义下载地址（如果这个地址失效，请替换为作者最新的有效地址）
          BASE_URL="https://ailg.ggbond.org"
          
          curl -sL ${BASE_URL}/xy_ailg.sh -o xy_ailg.sh
          curl -sL ${BASE_URL}/xy_utils.sh -o xy_utils.sh
          curl -sL ${BASE_URL}/xy_sync.sh -o xy_sync.sh
          curl -sL ${BASE_URL}/sun-panel.tar.gz -o sun-panel.tar.gz
          
          # 检查文件内容是否包含 404 或 html 标签
          if grep -q "<!DOCTYPE html>" xy_ailg.sh || [ ! -s xy_ailg.sh ]; then
            echo "❌ 下载失败：获取到的是错误页面或空文件"
            exit 1
          fi
          
          sed -i '1s/^\xEF\xBB\xBF//' *.sh
          sed -i 's/\r//g' *.sh

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "ActionBot"
          git add .
          git commit -m "🚀 全量同步资源: $(date)" || exit 0
          git push
