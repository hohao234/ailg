name: Sync to GHCR and Update Script

on:
  schedule:
    - cron: '0 */6 * * *' # 每6小时同步一次
  workflow_dispatch:      # 支持手动触发

jobs:
  sync-and-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Push Image
        run: |
          # 1. 拉取原版
          docker pull ailg/g-box:hostmode
          
          # 2. 获取唯一 ID (SHA)
          IMAGE_ID=$(docker inspect --format='{{index .Id}}' ailg/g-box:hostmode)
          echo "CURRENT_SHA=$IMAGE_ID" >> $GITHUB_ENV
          
          # 3. 显式指定镜像名为 g-box
          # 完整路径: ghcr.io/hjpcly1234/alig/g-box:hostmode
          docker tag ailg/g-box:hostmode ghcr.io/${{ github.repository }}/g-box:hostmode
          docker push ghcr.io/${{ github.repository }}/g-box:hostmode

      - name: Download and Patch Script
        run: |
          # 1. 下载原版主脚本和所有依赖工具脚本
          curl -sL https://ailg.ggbond.org/xy_ailg.sh -o my_install.sh
          curl -sL https://ailg.ggbond.org/xy_utils.sh -o xy_utils.sh
          curl -sL https://ailg.ggbond.org/xy_sync.sh -o xy_sync.sh
          
          # 2. 移除 BOM 隐藏字符并修复首行
          sed -i '1s/^\xEF\xBB\xBF//' my_install.sh
          sed -i '1c #!/bin/bash' my_install.sh
          
          # 3. 强制修改镜像源和注入 SHA
          sed -i "s|ailg/g-box:hostmode|ghcr.io/${{ github.repository }}/g-box:hostmode|g" my_install.sh
          sed -i "2i remote_sha=\"${{ env.CURRENT_SHA }}\"" my_install.sh
          sed -i "3i local_sha=\"${{ env.CURRENT_SHA }}\"" my_install.sh
          
          # 4. 暴力屏蔽：直接把脚本里的 docker pull 换成 true
          sed -i 's/docker pull/true #/g' my_install.sh
          
          # 5. 核心修复：修改脚本下载逻辑，让它从你的 GitHub 库下载配套脚本，而不是去原作者那下
          # 这样能保证所有脚本都在你的控制之下，且不会报文件不存在
          sed -i "s|https://ailg.ggbond.org/|https://raw.githubusercontent.com/${{ github.repository }}/main/|g" my_install.sh

      - name: Commit Updated Script
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 提交所有脚本：主脚本和配套工具
          git add my_install.sh xy_utils.sh xy_sync.sh
          git commit -m "🔄 同步镜像并全套修补脚本 SHA: ${{ env.CURRENT_SHA }}" || exit 0
          git push
