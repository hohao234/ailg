name: Sync to GHCR and Update Script

on:
  schedule:
    - cron: '0 */6 * * *' # 每6小时同步一次
  workflow_dispatch:      # 支持手动触发

jobs:
  sync-and-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Push Image
        run: |
          # 1. 拉取原版
          docker pull ailg/g-box:hostmode
          
          # 2. 获取唯一 ID (SHA)
          IMAGE_ID=$(docker inspect --format='{{index .Id}}' ailg/g-box:hostmode)
          echo "CURRENT_SHA=$IMAGE_ID" >> $GITHUB_ENV
          
          # 3. 显式指定镜像名为 g-box
          # 完整路径: ghcr.io/hjpcly1234/alig/g-box:hostmode
          docker tag ailg/g-box:hostmode ghcr.io/${{ github.repository }}/g-box:hostmode
          docker push ghcr.io/${{ github.repository }}/g-box:hostmode

      - name: Download and Patch Script
        run: |
          # 1. 下载全套脚本
          curl -sL https://ailg.ggbond.org/xy_ailg.sh -o my_install.sh
          curl -sL https://ailg.ggbond.org/xy_utils.sh -o xy_utils.sh
          curl -sL https://ailg.ggbond.org/xy_sync.sh -o xy_sync.sh

          # 2. 彻底清除所有脚本的 BOM 字符
          sed -i '1s/^\xEF\xBB\xBF//' my_install.sh xy_utils.sh xy_sync.sh
          
          # 3. 注入镜像地址和 SHA (改用全局替换，不插入新行，避免破坏结构)
          # 将脚本原有的镜像名直接替换成：你的镜像名" && local_sha="你的SHA" && remote_sha="你的SHA
          # 这样能强行接入脚本的变量链中，而不改变脚本的行数
          MY_IMAGE="ghcr.io/${{ github.repository }}/g-box:hostmode"
          MY_SHA="${{ env.CURRENT_SHA }}"
          
          sed -i "s|ailg/g-box:hostmode|$MY_IMAGE|g" my_install.sh
          # 这里的逻辑是：在镜像变量定义的后面，强行接上我们的强制赋值
          sed -i "s|local_sha=\$(docker inspect.*|local_sha=\"$MY_SHA\"|g" my_install.sh
          sed -i "s|remote_sha=.*|remote_sha=\"$MY_SHA\"|g" my_install.sh
          
          # 4. 屏蔽下载和更新逻辑
          sed -i 's/docker pull/true #/g' my_install.sh
          # 屏蔽脚本开头的自动下载更新检测
          sed -i 's/if download_file/if true #/g' my_install.sh
          
          # 5. 修正内部下载地址，防止它跳回官网
          sed -i "s|https://ailg.ggbond.org/|https://raw.githubusercontent.com/${{ github.repository }}/main/|g" my_install.sh

      - name: Commit Updated Script
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add my_install.sh xy_utils.sh xy_sync.sh
          git commit -m "🔄 稳定版补丁对齐 SHA: ${{ env.CURRENT_SHA }}" || exit 0
          git push
