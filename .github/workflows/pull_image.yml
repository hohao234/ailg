name: Sync to GHCR and Patch

on:
  schedule:
    - cron: '0 */3 * * *' # 每6小时自动运行
  workflow_dispatch:      # 支持手动触发

jobs:
  sync-and-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Push Image
        run: |
          docker pull ailg/g-box:hostmode
          docker tag ailg/g-box:hostmode ghcr.io/${{ github.repository }}/g-box:hostmode
          docker push ghcr.io/${{ github.repository }}/g-box:hostmode

      - name: Download and Prepare Scripts
        run: |
          curl -sL https://ailg.ggbond.org/xy_ailg.sh -o my_install.sh
          curl -sL https://ailg.ggbond.org/xy_utils.sh -o xy_utils.sh
          curl -sL https://ailg.ggbond.org/xy_sync.sh -o xy_sync.sh
          
          # 基础净化
          sed -i '1s/^\xEF\xBB\xBF//' *.sh
          sed -i 's/\r//g' *.sh

      - name: Commit to GitHub
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add *.sh
          git commit -m "🚀 同步镜像并更新脚本资源" || exit 0
          git push
