name: Sync to GHCR and Patch

on:
  schedule:
    - cron: '0 */3 * * *' # 每 3 小时自动运行一次
  workflow_dispatch:      # 支持手动触发

jobs:
  sync-and-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Push Image
        run: |
          docker pull ailg/g-box:hostmode
          # 获取拉取到的镜像真实 Digest (指纹)
          IMAGE_DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ailg/g-box:hostmode | cut -d'@' -f2)
          echo "最新镜像指纹: $IMAGE_DIGEST"
          # 将指纹写入文件，供 NAS 远程对比
          echo "$IMAGE_DIGEST" > version.txt
          
          docker tag ailg/g-box:hostmode ghcr.io/${{ github.repository }}/g-box:hostmode
          docker push ghcr.io/${{ github.repository }}/g-box:hostmode

# ... 前面 Login 和 Pull 镜像部分保持不变 ...

      - name: Download All Related Scripts
        run: |
          # 抓取原作者全家桶
          curl -sL https://ailg.ggbond.org/xy_ailg.sh -o my_install.sh
          curl -sL https://ailg.ggbond.org/xy_utils.sh -o xy_utils.sh
          curl -sL https://ailg.ggbond.org/xy_sync.sh -o xy_sync.sh
          
          # 净化所有下载的脚本
          sed -i '1s/^\xEF\xBB\xBF//' *.sh
          sed -i 's/\r//g' *.sh

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions@bot.com"
          git config --local user.name "ActionBot"
          # 确保 version.txt 和所有 .sh 都在提交列表中
          git add version.txt *.sh
          git commit -m "🚀 完整脚本与镜像同步: $(cat version.txt)" || exit 0
          git push
