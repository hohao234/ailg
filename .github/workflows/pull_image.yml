- name: Pre-check Hostmode Update
        id: check
        run: |
          # 1. 直接监控 hostmode 的最新指纹
          # 这样无论作者把 hostmode 指向 260421 还是 260422，脚本都能发现内容变了
          API_URL="https://hub.docker.com/v2/repositories/ailg/g-box/tags/hostmode"
          REMOTE_DIGEST=$(curl -s "$API_URL" | jq -r '.digest')
          
          # 2. 读取本地记录（version.txt）
          LOCAL_DIGEST=$(cat version.txt 2>/dev/null || echo "none")
          
          echo "远程 Hostmode 指纹: $REMOTE_DIGEST"
          echo "本地已同步指纹: $LOCAL_DIGEST"
          
          # 3. 对比逻辑
          if [ "$REMOTE_DIGEST" == "null" ] || [ -z "$REMOTE_DIGEST" ]; then
            echo "❌ 无法获取远程镜像信息，跳过本次同步。"
            echo "sync_needed=false" >> $GITHUB_OUTPUT
          elif [ "$REMOTE_DIGEST" == "$LOCAL_DIGEST" ]; then
            echo "✅ 镜像指纹未变（作者没更新），跳过。"
            echo "sync_needed=false" >> $GITHUB_OUTPUT
          else
            echo "🚀 检测到 Hostmode 指向了新镜像！准备同步..."
            echo "$REMOTE_DIGEST" > version.txt
            echo "sync_needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Pull and Sync to GHCR
        if: steps.check.outputs.sync_needed == 'true'
        run: |
          # 4. 直接拉取 hostmode 即可，它代表了作者当前的最新稳定版
          docker pull ailg/g-box:hostmode
          
          # 打上你自己的 GHCR 标签
          # 这样你在 NAS 上只需要拉取 ghcr.io/${{ github.repository }}/g-box:hostmode
          docker tag ailg/g-box:hostmode ghcr.io/${{ github.repository }}/g-box:hostmode
          
          # 推送到你自己的私有/公有仓库
          docker push ghcr.io/${{ github.repository }}/g-box:hostmode
