name: Sync to GHCR and Update Script

on:
  schedule:
    - cron: '0 */6 * * *' # 每6小时同步一次
  workflow_dispatch:      # 支持手动触发

jobs:
  sync-and-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Push Image
        run: |
          # 1. 拉取原版
          docker pull ailg/g-box:hostmode
          
          # 2. 获取唯一 ID (SHA)
          IMAGE_ID=$(docker inspect --format='{{index .Id}}' ailg/g-box:hostmode)
          echo "CURRENT_SHA=$IMAGE_ID" >> $GITHUB_ENV
          
          # 3. 显式指定镜像名为 g-box
          # 完整路径: ghcr.io/hjpcly1234/alig/g-box:hostmode
          docker tag ailg/g-box:hostmode ghcr.io/${{ github.repository }}/g-box:hostmode
          docker push ghcr.io/${{ github.repository }}/g-box:hostmode

      - name: Download and Patch Script
        run: |
          # 1. 下载全套脚本
          curl -sL https://ailg.ggbond.org/xy_ailg.sh -o my_install.sh
          curl -sL https://ailg.ggbond.org/xy_utils.sh -o xy_utils.sh
          curl -sL https://ailg.ggbond.org/xy_sync.sh -o xy_sync.sh

          # 2. 彻底移除 BOM 并修复首行（使用 printf 确保干净）
          printf "#!/bin/bash\n" > clean_install.sh
          tail -n +2 my_install.sh >> clean_install.sh
          mv clean_install.sh my_install.sh

          # 3. 注入镜像地址和 SHA (在脚本开头安全位置注入)
          # 注意：这里改用在 PATH 之后注入，避免破坏脚本结构
          sed -i "/export PATH/a remote_sha=\"${{ env.CURRENT_SHA }}\"\nlocal_sha=\"${{ env.CURRENT_SHA }}\"" my_install.sh
          
          # 4. 修改镜像源
          sed -i "s|ailg/g-box:hostmode|ghcr.io/${{ github.repository }}/g-box:hostmode|g" my_install.sh
          
          # 5. 【核心暴力操作】屏蔽下载逻辑
          # 既然你已经把全套脚本放在库里了，我们让主脚本直接去 /tmp 找文件，不下载
          sed -i 's/docker pull/true #/g' my_install.sh
          # 强制跳过脚本内部的 download_file 函数调用
          sed -i 's/if download_file/if true #/g' my_install.sh

          # 6. 【全路径替换】确保脚本内部所有的下载地址都指向你的 GitHub 库
          # 这样即便它要下载，也是下你库里那套
          sed -i "s|https://ailg.ggbond.org/|https://raw.githubusercontent.com/${{ github.repository }}/main/|g" my_install.sh

      - name: Commit Updated Script
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add my_install.sh xy_utils.sh xy_sync.sh
          git commit -m "🔄 完美缝合脚本与镜像 SHA: ${{ env.CURRENT_SHA }}" || exit 0
          git push
