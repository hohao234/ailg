name: Sync to GHCR and Update Script

on:
  schedule:
    - cron: '0 */6 * * *' # 每6小时同步一次
  workflow_dispatch:      # 支持手动触发

jobs:
  sync-and-patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Push Image
        run: |
          # 1. 拉取原版
          docker pull ailg/g-box:hostmode
          
          # 2. 获取唯一 ID (SHA)
          IMAGE_ID=$(docker inspect --format='{{index .Id}}' ailg/g-box:hostmode)
          echo "CURRENT_SHA=$IMAGE_ID" >> $GITHUB_ENV
          
          # 3. 显式指定镜像名为 g-box
          # 完整路径: ghcr.io/hjpcly1234/alig/g-box:hostmode
          docker tag ailg/g-box:hostmode ghcr.io/${{ github.repository }}/g-box:hostmode
          docker push ghcr.io/${{ github.repository }}/g-box:hostmode

      - name: Download and Patch Script
        run: |
          # 1. 下载
          curl -sL https://ailg.ggbond.org/xy_ailg.sh -o my_install.sh
          curl -sL https://ailg.ggbond.org/xy_utils.sh -o xy_utils.sh
          curl -sL https://ailg.ggbond.org/xy_sync.sh -o xy_sync.sh

          # 2. 去 BOM
          sed -i '1s/^\xEF\xBB\xBF//' *.sh
          
          # 3. 替换镜像名为你的 GHCR
          MY_IMAGE="ghcr.io/${{ github.repository }}/g-box:hostmode"
          sed -i "s|ailg/g-box:hostmode|$MY_IMAGE|g" my_install.sh
          
          # 4. 【核心手术】强行让脚本认为本地镜像就是最新的
          # 无论 local_sha 和 remote_sha 是什么，都让它们相等
          sed -i '/local_sha=$(docker inspect/c\    local_sha="equal"; remote_sha="equal"' my_install.sh
          
          # 5. 屏蔽掉所有 docker pull 相关的逻辑，防止它去连接代理点
          sed -i 's/docker pull/true #/g' my_install.sh

      - name: Commit Updated Script
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add my_install.sh xy_utils.sh xy_sync.sh
          git commit -m "🚀 修复路径指向与 SHA 对齐" || exit 0
          git push
