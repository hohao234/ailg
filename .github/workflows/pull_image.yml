name: Smart Sync to GHCR

on:
  schedule:
    - cron: '0 */3 * * *' # 每 3 小时自动运行
  workflow_dispatch:      # 支持手动点击运行

jobs:
  check-and-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Pre-check Hostmode Update
        id: check
        run: |
          # 1. 获取作者 hostmode 标签的最新唯一指纹 (Digest)
          API_URL="https://hub.docker.com/v2/repositories/ailg/g-box/tags/hostmode"
          REMOTE_DIGEST=$(curl -s "$API_URL" | jq -r '.digest')
          
          # 2. 读取上次同步保存的指纹
          LOCAL_DIGEST=$(cat version.txt 2>/dev/null || echo "none")
          
          echo "远程 Hostmode 指纹: $REMOTE_DIGEST"
          echo "本地已记录指纹: $LOCAL_DIGEST"
          
          # 3. 对比判断
          if [ "$REMOTE_DIGEST" == "null" ] || [ -z "$REMOTE_DIGEST" ]; then
            echo "❌ 无法获取远程镜像信息，可能接口变动，跳过。"
            echo "sync_needed=false" >> $GITHUB_OUTPUT
          elif [ "$REMOTE_DIGEST" == "$LOCAL_DIGEST" ]; then
            echo "✅ 指纹未变，作者没发新版，跳过。"
            echo "sync_needed=false" >> $GITHUB_OUTPUT
          else
            echo "🚀 发现新版本！更新指纹并准备同步。"
            echo "$REMOTE_DIGEST" > version.txt
            echo "sync_needed=true" >> $GITHUB_OUTPUT
          fi

      - name: Login to GHCR
        if: steps.check.outputs.sync_needed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Sync Image
        if: steps.check.outputs.sync_needed == 'true'
        run: |
          # 4. 拉取作者的 hostmode 镜像（此时已确认它是最新版）
          docker pull ailg/g-box:hostmode
          # 重新打标并推送到你自己的 GHCR 库
          docker tag ailg/g-box:hostmode ghcr.io/${{ github.repository }}/g-box:hostmode
          docker push ghcr.io/${{ github.repository }}/g-box:hostmode

      - name: Download Related Scripts
        if: steps.check.outputs.sync_needed == 'true'
        run: |
          # 5. 同步下载作者配套的最新脚本
          BASE_URL="https://ailg.ggbond.org"
          curl -sL ${BASE_URL}/xy_ailg.sh -o xy_ailg.sh
          curl -sL ${BASE_URL}/xy_utils.sh -o xy_utils.sh
          curl -sL ${BASE_URL}/xy_sync.sh -o xy_sync.sh
          curl -sL ${BASE_URL}/sun-panel.tar.gz -o sun-panel.tar.gz
          
          # 修正脚本格式，防止 Windows/Linux 换行符导致的报错
          sed -i '1s/^\xEF\xBB\xBF//' *.sh
          sed -i 's/\r//g' *.sh

      - name: Commit and Push Changes
        if: steps.check.outputs.sync_needed == 'true'
        run: |
          # 6. 将新的 version.txt 指纹和下载的脚本保存回 GitHub 仓库
          git config --local user.email "action@github.com"
          git config --local user.name "ActionBot"
          git add .
          git commit -m "🚀 自动同步更新: 镜像(hostmode)及资源包 $(date)" || exit 0
          git push
